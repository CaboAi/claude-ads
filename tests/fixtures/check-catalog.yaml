# Canonical catalog of every audit check ID across all platforms.
#
# This file is the single source of truth the eval harness uses to enforce:
#   1. Every check ID listed here MUST have a row in its platform's audit
#      reference file under ads/references/ (no orphan catalog entries).
#   2. Every check ID with a row in those reference files MUST appear here
#      (no untracked checks).
#
# Update this file when adding or removing a check. The corresponding
# pytest in tests/audit/test_check_coverage.py will fail on drift.
#
# ID convention (from ads/references/scoring-system.md):
#   - Sequential IDs (G01, M01, L01, T01, MS01): original v1.0 checks
#   - Hyphenated IDs (G-AI1, M-AN1, L-CRM1, T-SR1, MS-SI1): v1.5+ additions
#   - Prefixes: G=Google, M=Meta, L=LinkedIn, T=TikTok, MS=Microsoft

